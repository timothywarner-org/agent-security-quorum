name: Agent/Skill Security Scan

on:
  pull_request:
    paths:
      - ".github/agents/**"
      - ".github/skills/**"
      - ".claude/agents/**"
      - ".claude/skills/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Detect which agent/skill files changed
  # ──────────────────────────────────────────────
  detect_changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed agent/skill files
        id: detect
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...HEAD -- \
            '.github/agents/*.md' \
            '.github/skills/*/SKILL.md' \
            '.claude/agents/*.md' \
            '.claude/skills/*/SKILL.md' \
          )

          if [ -z "$FILES" ]; then
            echo "No agent/skill files changed."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files:"
            echo "$FILES"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_files=$(echo "$FILES" | base64 -w 0)" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────
  # Job 2: Structural validation (deterministic)
  # ──────────────────────────────────────────────
  validate_structure:
    name: Validate Structure
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML frontmatter
        run: |
          FILES=$(echo "${{ needs.detect_changes.outputs.changed_files }}" | base64 -d)
          WARNINGS=0

          echo "=== Structural Validation ==="
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && echo "  SKIP: $file (not found)" && continue

            echo "  Checking: $file"

            # Check frontmatter exists (file starts with ---)
            if ! head -1 "$file" | grep -q '^---$'; then
              echo "    WARNING: No YAML frontmatter"
              WARNINGS=$((WARNINGS + 1))
              continue
            fi

            # Extract frontmatter content
            FRONT=$(sed -n '2,/^---$/p' "$file" | sed '$d')

            # Check description exists
            if ! echo "$FRONT" | grep -q '^description:'; then
              echo "    WARNING: Missing 'description' field"
              WARNINGS=$((WARNINGS + 1))
            fi

            # Check for wildcard tool access
            if echo "$FRONT" | grep -qiE 'tools:.*(\*|"all"|all)'; then
              echo "    WARNING: Wildcard or unrestricted tool access"
              WARNINGS=$((WARNINGS + 1))
            fi

          done <<< "$FILES"

          echo ""
          echo "Structural warnings: $WARNINGS"
          # Structural issues are informational — LLM quorum is the gate

  # ──────────────────────────────────────────────
  # Job 3: LLM evaluation (3x parallel via matrix)
  #   Uses GitHub Copilot CLI in programmatic mode
  # ──────────────────────────────────────────────
  llm_scan:
    name: "LLM Scan (${{ matrix.lens }} / ${{ matrix.model }})"
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.has_changes == 'true'
    strategy:
      matrix:
        include:
          - lens: security
            model: gpt-4.1
          - lens: privilege
            model: claude-sonnet-4.5
          - lens: compliance
            model: gemini-2.5-pro
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: "Evaluate: ${{ matrix.lens }} lens via ${{ matrix.model }}"
        run: |
          FILES=$(echo "${{ needs.detect_changes.outputs.changed_files }}" | base64 -d)
          LENS="${{ matrix.lens }}"
          mkdir -p results

          # Build file contents block
          FILE_CONTENTS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            FILE_CONTENTS+="FILE: ${file}"$'\n'
            FILE_CONTENTS+="$(cat "$file")"
            FILE_CONTENTS+=$'\n\n'
          done <<< "$FILES"

          # Load prompts
          LENS_PROMPT=$(cat "prompts/lens-${LENS}.txt")
          BASE_PROMPT=$(cat "prompts/v1.txt")
          FULL_PROMPT="${LENS_PROMPT}"$'\n\n'"${BASE_PROMPT}"$'\n'"${FILE_CONTENTS}"

          echo "Evaluating with ${LENS} lens ($(echo "$FULL_PROMPT" | wc -c) chars)..."

          # Write prompt to temp file to avoid shell escaping issues
          echo "$FULL_PROMPT" > /tmp/prompt.txt

          # Call Copilot CLI in programmatic mode
          # --output-format json returns JSONL (one JSON event per line)
          set +e
          copilot -p "$(cat /tmp/prompt.txt)" \
            --model "${{ matrix.model }}" \
            --output-format json \
            --no-ask-user > /tmp/copilot-output.jsonl 2>/tmp/copilot-stderr.txt
          EXIT_CODE=$?
          set -e

          echo "Copilot CLI exit code: $EXIT_CODE"
          if [ -s /tmp/copilot-stderr.txt ]; then
            echo "Copilot CLI stderr:"
            cat /tmp/copilot-stderr.txt
          fi
          echo "JSONL output: $(wc -l < /tmp/copilot-output.jsonl) lines, $(wc -c < /tmp/copilot-output.jsonl) bytes"

          # --- Extract text from JSONL event stream ---
          # Broad selector: grab any string from .data fields regardless of key name
          TEXT=$(jq -r '
            select(.data != null) | .data |
            if type == "string" then .
            elif type == "object" then
              (.content // .text // .message // .delta // .body // empty) |
              if type == "array" then .[] | (.text // .content // empty)
              elif type == "string" then .
              else empty end
            else empty end
          ' /tmp/copilot-output.jsonl 2>/dev/null | tr -d '\0')

          # Fallback: recursive string extraction from all fields
          if [ -z "$TEXT" ]; then
            TEXT=$(jq -r '.. | strings' /tmp/copilot-output.jsonl 2>/dev/null | tr -d '\0')
          fi

          echo "Extracted text: $(echo "$TEXT" | wc -c) chars"

          # --- Extract verdict JSON using balanced brace matching ---
          VERDICT_JSON=$(perl -0777 -ne '
            while (/(\{(?:[^{}]|(?1))*\})/g) {
              my $block = $1;
              if ($block =~ /"verdict"/) { print $block; last; }
            }
          ' <<< "$TEXT" 2>/dev/null)

          # --- Parse and validate ---
          PARSED=""
          if [ -n "$VERDICT_JSON" ] && echo "$VERDICT_JSON" | jq -e '.verdict' > /dev/null 2>&1; then
            V=$(echo "$VERDICT_JSON" | jq -r '.verdict')
            if [ "$V" = "SAFE" ] || [ "$V" = "UNSAFE" ]; then
              # Ensure findings array exists, add model info
              echo "$VERDICT_JSON" | jq --arg m "${{ matrix.model }}" \
                '{verdict, findings: (.findings // []), model: $m}' > "results/${LENS}.json"
              PARSED="yes"
              echo "Verdict: $V"
            fi
          fi

          # Fail-safe
          if [ -z "$PARSED" ]; then
            echo "FAIL-SAFE: No valid verdict extracted. Voting UNSAFE."
            jq -n --arg m "${{ matrix.model }}" \
              '{verdict:"UNSAFE",findings:["Evaluation failed or returned invalid response"],model:$m,error:true}' \
              > "results/${LENS}.json"
          fi

          cat "results/${LENS}.json"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "llm-result-${{ matrix.lens }}"
          path: "results/${{ matrix.lens }}.json"

  # ──────────────────────────────────────────────
  # Job 4: Aggregate votes and apply quorum
  # ──────────────────────────────────────────────
  aggregate:
    name: Quorum Decision
    runs-on: ubuntu-latest
    needs: [detect_changes, validate_structure, llm_scan]
    if: needs.detect_changes.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download all evaluation results
        uses: actions/download-artifact@v4
        with:
          pattern: llm-result-*
          path: results/
          merge-multiple: true

      - name: Apply quorum
        id: quorum
        run: |
          echo "=========================================="
          echo "  QUORUM AGGREGATION"
          echo "=========================================="

          SAFE=0
          UNSAFE=0

          for lens in security privilege compliance; do
            FILE="results/${lens}.json"
            if [ ! -f "$FILE" ]; then
              echo "  [${lens}] MISSING — counting as UNSAFE"
              UNSAFE=$((UNSAFE + 1))
              continue
            fi

            VERDICT=$(jq -r '.verdict // "UNKNOWN"' "$FILE")
            case "$VERDICT" in
              SAFE)   echo "  [${lens}] SAFE";   SAFE=$((SAFE + 1)) ;;
              UNSAFE) echo "  [${lens}] UNSAFE"; UNSAFE=$((UNSAFE + 1)) ;;
              *)      echo "  [${lens}] UNKNOWN — counting as UNSAFE"; UNSAFE=$((UNSAFE + 1)) ;;
            esac
          done

          echo ""
          echo "  SAFE: $SAFE / UNSAFE: $UNSAFE"

          if [ "$UNSAFE" -ge 2 ]; then
            echo "  QUORUM: FAIL"
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
          else
            echo "  QUORUM: PASS"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          fi

          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"
          echo "unsafe=$UNSAFE" >> "$GITHUB_OUTPUT"

          # Collect all findings for the PR comment
          FINDINGS=$(jq -s '[.[].findings[]? // empty] | unique' results/*.json)
          echo "findings=$(echo "$FINDINGS" | jq -c '.')" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Agent/Skill Security Scan"
            echo ""
            echo "| Evaluator | Model | Verdict |"
            echo "|-----------|-------|---------|"
            for lens in security privilege compliance; do
              FILE="results/${lens}.json"
              if [ -f "$FILE" ]; then
                V=$(jq -r '.verdict' "$FILE")
                M=$(jq -r '.model // "unknown"' "$FILE")
                [ "$V" = "SAFE" ] && echo "| ${lens} | ${M} | ✅ SAFE |" || echo "| ${lens} | ${M} | ❌ UNSAFE |"
              else
                echo "| ${lens} | — | ⚠️ MISSING |"
              fi
            done
            echo ""
            echo "**Quorum: ${{ steps.quorum.outputs.result }}** (${{ steps.quorum.outputs.unsafe }}/3 UNSAFE)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ steps.quorum.outputs.result }}';
            const safe = ${{ steps.quorum.outputs.safe }};
            const unsafe = ${{ steps.quorum.outputs.unsafe }};
            const icon = result === 'PASS' ? '✅' : '❌';

            const fs = require('fs');
            const lenses = ['security', 'privilege', 'compliance'];
            const rows = [];
            const findingsBlocks = [];

            for (const lens of lenses) {
              try {
                const data = JSON.parse(fs.readFileSync(`results/${lens}.json`, 'utf8'));
                const vi = data.verdict === 'SAFE' ? '✅ SAFE' : '❌ UNSAFE';
                const model = data.model || 'unknown';
                rows.push(`| ${lens} | ${model} | ${vi} |`);

                if (data.findings && data.findings.length > 0 && data.verdict === 'UNSAFE') {
                  const items = data.findings.map(f => `- ${f}`).join('\n');
                  findingsBlocks.push(`**${lens}** (${model}):\n${items}`);
                }
              } catch {
                rows.push(`| ${lens} | — | ⚠️ MISSING |`);
              }
            }

            let body = `## ${icon} Agent/Skill Security Scan\n\n`;
            body += `| Evaluator | Model | Verdict |\n|-----------|-------|---------|\n${rows.join('\n')}\n\n`;
            body += `**Quorum: ${result}** (${unsafe}/3 UNSAFE)\n`;

            if (findingsBlocks.length > 0) {
              if (result === 'FAIL') {
                body += `\n### Findings\n\n${findingsBlocks.join('\n\n')}\n`;
              } else {
                body += `\n<details>\n<summary>Findings (${findingsBlocks.length} evaluator(s))</summary>\n\n${findingsBlocks.join('\n\n')}\n</details>\n`;
              }
            }

            body += `\n---\n*Scanned by [agent-security-quorum](https://github.com/timothywarner/agent-security-quorum)*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.includes('Agent/Skill Security Scan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on UNSAFE quorum
        if: steps.quorum.outputs.result == 'FAIL'
        run: |
          echo "❌ Quorum voted UNSAFE — failing build."
          exit 1
